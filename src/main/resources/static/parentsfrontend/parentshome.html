<!DOCTYPE html>
<html>
<head>
    <title>School Bus Tracker - Home</title>

    <style>
        body {
          font-family: Arial, sans-serif;
          background-color: #f5f5f5;
          text-align: center;
          padding-top: 50px;
        }

        .container {
          background: white;
          width: 350px;
          margin: auto;
          padding: 20px;
          border-radius: 10px;
          box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        select, button {
          width: 100%;
          padding: 10px;
          margin-top: 15px;
          font-size: 16px;
        }

        button {
          background-color: #28a745;
          color: white;
          border: none;
          cursor: pointer;
        }

        button:hover {
          background-color: #218838;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Track Your School Bus</h2>

    <!-- School -->
    <select id="school" onchange="loadRoutes()">
        <option value="">Select School</option>
    </select>

    <!-- Route -->
    <select id="route" onchange="loadStops()">
        <option value="">Select Route</option>
    </select>

    <!-- Stop -->
    <select id="stop">
        <option value="">Select Stop</option>
    </select>

    <button onclick="trackBus()">Track Bus</button>
</div>

<script>

    const BASE_URL = window.location.origin;

    // Load Schools on page load
    window.onload = function () {
        loadSchools();
    };

    function loadSchools() {
        fetch(`${BASE_URL}/api/schools`)
            .then(res => res.json())
            .then(data => {
                const schoolSelect = document.getElementById("school");
                schoolSelect.innerHTML = "<option value=''>Select School</option>";

                data.forEach(s => {
                    schoolSelect.innerHTML += `<option value="${s.id}">${s.name}</option>`;
                });
            })
            .catch(err => console.error("Error loading schools:", err));
    }

    function loadRoutes() {
        const schoolId = document.getElementById("school").value;

        if (!schoolId) return;

        fetch(`${BASE_URL}/api/routes?schoolId=${schoolId}`)
            .then(res => res.json())
            .then(data => {
                const routeSelect = document.getElementById("route");
                routeSelect.innerHTML = "<option value=''>Select Route</option>";

                data.forEach(r => {
                    routeSelect.innerHTML += `
                        <option value="${r.id}" data-bus="${r.busId}">
                            ${r.name}
                        </option>`;
                });

                // Reset stops when school changes
                document.getElementById("stop").innerHTML = "<option>Select Stop</option>";
            })
            .catch(err => console.error("Error loading routes:", err));
    }

    function loadStops() {
        const routeId = document.getElementById("route").value;

        if (!routeId) return;

        fetch(`${BASE_URL}/api/stops/by-route?routeId=${routeId}`)
            .then(res => res.json())
            .then(data => {
                const stopSelect = document.getElementById("stop");
                stopSelect.innerHTML = "<option value=''>Select Stop</option>";

                data.forEach((s, index) => {
                    stopSelect.innerHTML += `<option value="${index}">${s.name}</option>`;
                });
            })
            .catch(err => console.error("Error loading stops:", err));
    }

    function trackBus() {
        const routeSelect = document.getElementById("route");
        const stopSelect = document.getElementById("stop");

        const routeIndex = routeSelect.selectedIndex;
        const busId = routeSelect.options[routeIndex]?.dataset?.bus;
        const stopIndex = stopSelect.value;

        if (!busId || stopIndex === "") {
            alert("Please select route and stop");
            return;
        }

        // Redirect to tracking page
        window.location.href =
            `parentsui.html?busId=${busId}&stopIndex=${stopIndex}`;
    }

</script>

</body>
</html>
