<!DOCTYPE html>
<html>
<head>
    <title>School Bus Tracker</title>

    <!-- Google Maps -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDqKOigqG00RFB1HygOsWlvMwsUYk9l4bI"></script>

    <!-- WebSocket -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

    <style>
        body {
          margin: 0;
          font-family: Arial, sans-serif;
        }

        #map {
          height: 50vh;
          width: 100%;
        }

        #bottomPanel {
          height: 50vh;
          padding: 10px;
          overflow-y: auto;
          border-top: 2px solid #ccc;
        }

        .stop {
          padding: 10px;
          border-bottom: 1px solid #eee;
        }

        .highlight {
          background-color: #d4edda;
          font-weight: bold;
        }
    </style>
</head>

<body>

<h2 style="text-align:center;">Live Bus Tracking</h2>

<div id="map"></div>

<div id="bottomPanel">
    <h3>Stops & ETA</h3>
    <div id="stopsList"></div>
</div>

<script>
    let map;
    let marker;
    let stops = [];
    let stopMarkers = [];
    let routeLine;
    let isMapCentered = false;

    function getQueryParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        busId: params.get("busId"),
        stopIndex: parseInt(params.get("stopIndex"))
      };
    }

    const query = getQueryParams();
    const busId = query.busId || "BUS101";
    let selectedStopIndex = isNaN(query.stopIndex) ? 0 : query.stopIndex;

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        zoom: 14,
        center: { lat: 25.4239, lng: 77.6487 } // Shivpuri default
      });
    }

    function connectWebSocket() {
      const socket = new SockJS('http://localhost:8080/ws');
      const stompClient = Stomp.over(socket);

      stompClient.connect({}, function () {
        stompClient.subscribe('/topic/location/' + busId, function (message) {
          const data = JSON.parse(message.body);

          const position = {
            lat: data.lat,
            lng: data.lng
          };

          updateBusLocation(position);
          updateETA(position);
        });
      });
    }

    function updateBusLocation(position) {
      if (!marker) {
        marker = new google.maps.Marker({
    position: position,
    map: map,
    title: "School Bus",
    icon: {
        url: "https://maps.google.com/mapfiles/kml/shapes/bus.png", // ✅ bus icon
        scaledSize: new google.maps.Size(40, 40) // adjust size
    }
});

        if (!isMapCentered) {
          map.setCenter(position);
          isMapCentered = true;
        }
      } else {
        marker.setPosition(position);
      }
    }

    function clearOldMarkers() {
      stopMarkers.forEach(m => m.setMap(null));
      stopMarkers = [];
    }

    function loadStops() {
      fetch("http://localhost:8080/api/stops/by-bus/" + busId)
        .then(res => res.json())
        .then(data => {

          stops = data;

          // Clear old UI & markers
          document.getElementById("stopsList").innerHTML = "";
          clearOldMarkers();

          stops.forEach((stop, index) => {

            // Map Marker
            const stopMarker = new google.maps.Marker({
  position: { lat: stop.lat, lng: stop.lng },
  map: map,
  title: stop.name,

  icon: index === selectedStopIndex
    ? {
        url: "https://cdn-icons-png.flaticon.com/512/61/61231.png", // 🚌 selected stop
        scaledSize: new google.maps.Size(35, 35)
      }
    : {
        url: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png", // normal stops
      }
});

            stopMarkers.push(stopMarker);

            // Bottom list
            const div = document.createElement("div");
            div.className = "stop";
            div.id = "stop-" + index;
            div.innerHTML = `${index + 1}. ${stop.name} - ETA: --`;
            document.getElementById("stopsList").appendChild(div);
          });

          drawRoute();
        });
    }

    function drawRoute() {

      if (routeLine) {
        routeLine.setMap(null); // remove old route
      }

      const path = stops.map(s => ({ lat: s.lat, lng: s.lng }));

      routeLine = new google.maps.Polyline({
        path: path,
        geodesic: true,
        strokeColor: "#FF0000",
        strokeOpacity: 1.0,
        strokeWeight: 3,
        map: map
      });
    }

    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;

      const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI/180) *
        Math.cos(lat2 * Math.PI/180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);

      return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function calculateETA(busLat, busLng, stopLat, stopLng) {
      const distance = getDistance(busLat, busLng, stopLat, stopLng);
      const speed = 30;
      const time = (distance / speed) * 60;
      return Math.max(1, Math.round(time));
    }

    function updateETA(position) {
      stops.forEach((stop, index) => {
        const eta = calculateETA(position.lat, position.lng, stop.lat, stop.lng);

        const stopDiv = document.getElementById("stop-" + index);
        stopDiv.innerHTML = `${index + 1}. ${stop.name} - ETA: ${eta} min`;

        if (index === selectedStopIndex) {
          stopDiv.classList.add("highlight");
        }
      });
    }

    window.onload = function () {
      initMap();
      loadStops();
      connectWebSocket();
    };
</script>

</body>
</html>
