<!DOCTYPE html>
<html>
<head>
    <title>Driver App</title>
</head>
<body>
<h2>Driver GPS Tracker</h2>

<!-- ✅ Dropdown instead of manual input -->
<select id="routeSelect">
    <option value="">Select Bus Route</option>
</select>

<br><br>

<button onclick="startTracking()">Start Trip</button>
<button onclick="stopTracking()">Stop Trip</button>

<p id="status">Status: Idle</p>

<script>
    let intervalId;
    let activeBusId = null;
    const BASE_URL = window.location.origin;

    // ✅ Load routes on page load
    window.onload = function () {
        fetch(`${BASE_URL}/api/routes/all`)
            .then(res => res.json())
            .then(data => {
                const dropdown = document.getElementById("routeSelect");

                data.forEach(route => {
                    dropdown.innerHTML += `
                        <option value="${route.busId}">
                            ${route.name} (${route.busId})
                        </option>
                    `;
                });
            });
    };

    function startTracking() {
        const selected = document.getElementById("routeSelect");

        const busId = selected.value;

        if (!busId) {
            alert("Please select a route");
            return;
        }

        activeBusId = busId;

        // Disable dropdown while tracking
        selected.disabled = true;

        document.getElementById("status").innerText =
            "Tracking started for " + activeBusId;

        intervalId = setInterval(() => {

            navigator.geolocation.getCurrentPosition(position => {

                const data = {
                    busId: activeBusId,
                    lat: position.coords.latitude,
                    lng: position.coords.longitude,
                    timestamp: new Date().toISOString()
                };

                fetch(`${BASE_URL}/api/location`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                });

                console.log("Sent:", data);

            }, error => {
                console.error(error);
            });

        }, 5000);
    }

    function stopTracking() {
        clearInterval(intervalId);

        document.getElementById("status").innerText = "Tracking stopped";

        // Enable dropdown again
        document.getElementById("routeSelect").disabled = false;

        activeBusId = null;
    }
</script>
</body>
</html>
